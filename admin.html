<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SA Móveis</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Archivo+Black&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --vermelho-sa: #b90c29;
            --azul-sa: #0047BB;
            --azul-escuro: #003087;
            --branco: #ffffff;
            --cinza-bg: #f4f5f7;
            --cinza-card: #ffffff;
            --cinza-borda: #dcdcdc;
            --texto: #1e1e1e;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--cinza-bg);
            color: var(--texto);
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .topo {
            background: linear-gradient(135deg, var(--vermelho-sa), var(--azul-sa));
            border-radius: 18px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .topo h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .topo p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: var(--cinza-card);
            border-radius: 18px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--azul-escuro);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            background: #fff;
            margin-bottom: 10px;
        }

        input:focus,
        textarea:focus {
            border-color: var(--azul-sa);
            box-shadow: 0 0 0 4px rgba(0,71,187,0.10);
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--vermelho-sa), #8e081f);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(185,12,41,0.25);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--azul-sa), var(--azul-escuro));
            color: white;
            margin-bottom: 18px;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,71,187,0.25);
        }

        .produto-item {
            border: 1px solid var(--cinza-borda);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
        }

        .produto-item:hover {
            border-color: var(--azul-sa);
            transform: translateY(-2px);
        }

        .produto-info h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .produto-info p {
            color: #555;
            font-weight: 500;
        }

        .acoes {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background: var(--azul-sa);
            color: white;
        }

        .btn-remove {
            background: var(--vermelho-sa);
            color: white;
        }

        .btn-edit,
        .btn-remove {
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-edit:hover,
        .btn-remove:hover {
            transform: scale(1.05);
        }

        textarea {
            min-height: 300px;
            resize: vertical;
            font-family: monospace;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 15px;
            }

            .topo h1 {
                font-size: 2rem;
            }

            .produto-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .acoes {
                width: 100%;
            }

            .btn-edit,
            .btn-remove {
                flex: 1;
            }
        }

    </style>
</head>
<body>
    <script> //Para curiosos nao mexer

    const senhaCorreta = "1234";

    const senhaDigitada = prompt("Digite a senha do painel administrativo:");

    if (senhaDigitada !== senhaCorreta) {

        document.body.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                flex-direction:column;
                background:#f4f5f7;
                font-family:Arial;
                text-align:center;
                padding:20px;
            ">

                <h1 style="
                    color:#b90c29;
                    font-size:3rem;
                    margin-bottom:10px;
                ">
                    Acesso negado
                </h1>

                <p style="
                    color:#555;
                    font-size:1.2rem;
                    margin-bottom:25px;
                ">
                    Senha incorreta.
                </p>

                <button onclick="window.location.reload()" style="
                    background:#0047BB;
                    color:white;
                    border:none;
                    padding:14px 24px;
                    border-radius:12px;
                    font-size:1rem;
                    font-weight:bold;
                    cursor:pointer;
                    transition:0.3s;
                ">
                    Tentar novamente
                </button>

            </div>
        `;

        window.stop();

        throw new Error("Acesso negado");
    }

</script>

    <div class="container">

        <div class="topo">
            <h1>SA Móveis Admin</h1>
            <p>Painel de gerenciamento de produtos da vitrine</p>
        </div>

        <div class="grid">

            <div class="card">
                <h2>Adicionar produto</h2>

                <form id="formProduto">
                    <input type="text" id="nome" placeholder="Nome do produto" required>

                    <input type="text" id="preco" placeholder="Preço à vista" inputmode="numeric" required>

                    <input type="text" id="precoCartao" placeholder="Preço no cartão" inputmode="numeric" required>

                    <input type="number" id="parcelas" placeholder="Quantidade de parcelas" min="1" required>

                    <input type="text" id="imagem" placeholder="Caminho da imagem" required>

                    <input type="text" id="link" placeholder="Link da página do produto" required>

                    <button class="btn btn-primary" type="submit">
                        Adicionar produto
                    </button>
                </form>
            </div>

            <div class="card">
                <h2>Produtos cadastrados</h2>
<input type="text" id="pesquisaAdmin" placeholder="Buscar produto para editar...">
                <div id="listaProdutosAdmin"></div>
            </div>

        </div>

        <div class="card" style="margin-top:25px;">
            <h2>Exportar catálogo</h2>

            <button class="btn btn-download" id="baixarJson">
                Baixar produtos.json
            </button>

            <textarea id="jsonGerado"></textarea>
        </div>

    </div>

    <script>
    // ===============================
    // DADOS PRINCIPAIS
    // ===============================
    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
    let produtoEditando = null;

    // ===============================
    // ELEMENTOS DO HTML
    // ===============================
    const form = document.getElementById("formProduto");
    const lista = document.getElementById("listaProdutosAdmin");
    const jsonGerado = document.getElementById("jsonGerado");
    const baixarJson = document.getElementById("baixarJson");
    const botaoSubmit = form.querySelector("button[type='submit']");
    const pesquisaAdmin = document.getElementById("pesquisaAdmin");

    const nomeInput = document.getElementById("nome");
    const precoInput = document.getElementById("preco");
    const precoCartaoInput = document.getElementById("precoCartao");
    const parcelasInput = document.getElementById("parcelas");
    const imagemInput = document.getElementById("imagem");
    const linkInput = document.getElementById("link");

    // ===============================
    // FORMATAR PREÇO EM REAL
    // ===============================
    function formatarMoeda(input) {
        let valor = input.value.replace(/\D/g, "");

        valor = (Number(valor) / 100).toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL"
        });

        input.value = valor;
    }

    precoInput.addEventListener("input", function () {
        formatarMoeda(precoInput);
    });

    precoCartaoInput.addEventListener("input", function () {
        formatarMoeda(precoCartaoInput);
    });

    // ===============================
    // CALCULAR VALOR DA PARCELA
    // ===============================
    function calcularParcela(precoCartao, quantidadeParcelas) {
        const valorNumerico = Number(precoCartao.replace(/\D/g, "")) / 100;
        const parcelas = Number(quantidadeParcelas);

        if (!valorNumerico || !parcelas) {
            return "R$ 0,00";
        }

        const valorParcela = valorNumerico / parcelas;

        return valorParcela.toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL"
        });
    }

    // ===============================
    // ADICIONAR OU SALVAR ALTERAÇÃO
    // ===============================
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const produto = {
            nome: nomeInput.value,
            preco: precoInput.value,
            precoCartao: precoCartaoInput.value,
            parcelas: Number(parcelasInput.value),
            valorParcela: calcularParcela(precoCartaoInput.value, parcelasInput.value),
            imagem: imagemInput.value,
            link: linkInput.value
        };

        if (produtoEditando === null) {

    const confirmarAdicao = confirm(
        `Deseja realmente adicionar o produto "${produto.nome}"?`
    );

    if (!confirmarAdicao) {
        return;
    }

    produtos.push(produto);

} else {

    const confirmarEdicao = confirm(
        `Deseja realmente salvar as alterações do produto "${produto.nome}"?`
    );

    if (!confirmarEdicao) {
        return;
    }

    produtos[produtoEditando] = produto;

    produtoEditando = null;

    botaoSubmit.textContent = "Adicionar produto";
}

        localStorage.setItem("produtos", JSON.stringify(produtos));

        form.reset();
        atualizarTela();
    });

    // ===============================
    // ATUALIZAR LISTA NA TELA
    // ===============================
    function atualizarTela() {
        lista.innerHTML = "";

        const termo = pesquisaAdmin.value.toLowerCase().trim();

        produtos.forEach((produto, index) => {
            const nomeProduto = produto.nome.toLowerCase();

            if (!nomeProduto.includes(termo)) {
                return;
            }

            lista.innerHTML += `
                <div class="produto-item">
                    <div class="produto-info">
                        <h3>${produto.nome}</h3>
                        <p>${produto.preco}</p>
                        <small>
                            Cartão: ${produto.precoCartao} em ${produto.parcelas}x de ${produto.valorParcela}
                        </small>
                    </div>

                    <div class="acoes">
                        <button class="btn-edit" onclick="editarProduto(${index})">
                            Editar
                        </button>

                        <button class="btn-remove" onclick="removerProduto(${index})">
                            Remover
                        </button>
                    </div>
                </div>
            `;
        });

        jsonGerado.value = JSON.stringify(produtos, null, 4);
    }

    // ===============================
    // EDITAR PRODUTO
    // ===============================
    function editarProduto(index) {
        const produto = produtos[index];

        nomeInput.value = produto.nome;
        precoInput.value = produto.preco;
        precoCartaoInput.value = produto.precoCartao;
        parcelasInput.value = produto.parcelas;
        imagemInput.value = produto.imagem;
        linkInput.value = produto.link;

        produtoEditando = index;
        botaoSubmit.textContent = "Salvar alteração";

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    }

    // ===============================
    // REMOVER PRODUTO
    // ===============================
    function removerProduto(index) {
    const produto = produtos[index];

    const confirmar = confirm(
        `Tem certeza que deseja remover o produto "${produto.nome}"?\n\nEssa ação não pode ser desfeita.`
    );

    if (!confirmar) {
        return;
    }

    produtos.splice(index, 1);
    localStorage.setItem("produtos", JSON.stringify(produtos));
    atualizarTela();
}

    // ===============================
    // BAIXAR JSON
    // ===============================
    baixarJson.addEventListener("click", function () {
        const conteudo = JSON.stringify(produtos, null, 4);

        const blob = new Blob([conteudo], {
            type: "application/json"
        });

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "produtos.json";
        link.click();
    });

    // ===============================
    // PESQUISA ADMIN
    // ===============================
    pesquisaAdmin.addEventListener("input", atualizarTela);

    atualizarTela();
</script>

</body>
</html>
```
